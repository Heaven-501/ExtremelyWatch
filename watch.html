    <style>
        :root {
            --primary: #FF0055;
            --bg: #0f0f13;
            --card-bg: #1a1a20;
            --card-hover: #2b2b36;
            --text: #ffffff;
            --text-sec: #aaaaaa;
            --success: #00ff88;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding-bottom: 30px;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background-color: var(--bg);
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
            margin-left: 15px;
            text-decoration: none;
        }

        .header-title {
            font-size: 1.1rem;
            font-weight: bold;
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Video Player Container */
        .player-container {
            width: 100%;
            background-color: #000;
            aspect-ratio: 16 / 9;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
            /* FIX 3: Native fullscreen is handled by the browser/controls here */
        }

        /* Info Section */
        .info-section {
            padding: 15px 20px;
        }

        .anime-title {
            font-size: 1.3rem;
            margin: 0 0 5px 0;
            color: var(--primary);
        }

        .current-ep-text {
            font-size: 0.9rem;
            color: var(--text-sec);
            margin-bottom: 15px;
        }

        /* Season Selector */
        .seasons-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 15px;
            scrollbar-width: none; /* Firefox */
        }
        .seasons-container::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        .season-btn {
            background-color: var(--card-bg);
            border: 1px solid #333;
            color: var(--text);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .season-btn.active {
            background-color: var(--primary);
            border-color: var(--primary);
            font-weight: bold;
        }

        /* Episodes Grid */
        .episodes-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            padding: 0 20px;
        }

        .ep-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--card-bg);
            border: none;
            color: var(--text);
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            text-align: right;
            font-size: 1rem;
            transition: background 0.2s;
        }

        .ep-btn:active {
            transform: scale(0.98);
        }

        .ep-btn.playing {
            border-right: 4px solid var(--primary);
            background-color: var(--card-hover);
        }

        .ep-status {
            font-size: 0.8rem;
            color: var(--success);
        }

    </style>
</head>

                watchedData[currentId] = {};
            }

            renderSeasons();
            renderEpisodes(currentSeason);

            // Auto-play episode if 'e' parameter was passed from Continue Watching
            if (currentEpisode) {
                const epData = animeData.seasons[currentSeason].find(x => x.ep === currentEpisode);
                if (epData) {
                    playEpisode(currentEpisode, epData.title, epData.url);
                }
            }
        }

        // --- 5. UI Rendering Functions ---
        function renderSeasons() {
            const container = document.getElementById('seasons-container');
            container.innerHTML = '';
            
            const seasons = Object.keys(animeData.seasons);
            
            // Hide season selector if there's only 1 season
            if (seasons.length <= 1) {
                container.style.display = 'none';
                return;
            }

            seasons.forEach(s => {
                const btn = document.createElement('button');
                btn.className = `season-btn ${s == currentSeason ? 'active' : ''}`;
                btn.innerText = `الموسم ${s}`;
                btn.onclick = () => {
                    currentSeason = parseInt(s);
                    renderSeasons(); // Re-render to update active class
                    renderEpisodes(currentSeason);
                };
                container.appendChild(btn);
            });
        }

        function renderEpisodes(season) {
            const container = document.getElementById('episodes-grid');
            container.innerHTML = '';
            
            const episodes = animeData.seasons[season];
            
            episodes.forEach(epObj => {
                const isWatched = watchedData[currentId]?.[season]?.[epObj.ep];
                const isPlaying = (currentEpisode === epObj.ep);

                const btn = document.createElement('button');
                btn.className = `ep-btn ${isPlaying ? 'playing' : ''}`;
                btn.onclick = () => playEpisode(epObj.ep, epObj.title, epObj.url);
                
                btn.innerHTML = `
                    <span>${epObj.title}</span>
                    <span class="ep-status" id="status-s${season}-e${epObj.ep}">
                        ${isWatched ? '✅' : ''}
                    </span>
                `;
                container.appendChild(btn);
            });
        }

        // --- 6. Core Logic: Playing & Tracking ---
        function playEpisode(epNum, epTitle, vidUrl) {
            currentEpisode = epNum;
            
            // Update UI text
            document.getElementById('current-ep-text').innerText = `الموسم ${currentSeason} | ${epTitle}`;
            
            // Update Video Player
            const player = document.getElementById('video-player');
            const source = document.getElementById('video-source');
            source.src = vidUrl;
            player.load();
            player.play().catch(e => console.log("Auto-play prevented by browser."));

            // Re-render episodes to highlight the playing one
            renderEpisodes(currentSeason);

            // Save to "Continue Watching" for index.html
            const cwData = {
                id: currentId,
                title: animeData.title,
                season: currentSeason,
                episode: epNum
            };
            localStorage.setItem('extWeeb_lastWatch', JSON.stringify(cwData));

            // FIX 2: The 15 Minute Watched Logic
            // Clear any existing timer so we don't accidentally mark a skipped episode as watched
            if (watchTimer) {
                clearTimeout(watchTimer);
            }

            // Start a new timer. If the user stays on this episode/page for 15 mins, mark as watched.
            watchTimer = setTimeout(() => {
                markAsWatched(currentSeason, epNum);
            }, WATCH_THRESHOLD_MS);
        }

        function markAsWatched(season, epNum) {
            if (!watchedData[currentId][season]) {
                watchedData[currentId][season] = {};
            }
            watchedData[currentId][season][epNum] = true;
            localStorage.setItem('extWeeb_watched', JSON.stringify(watchedData));
            
            // Visually update the tick mark without fully re-rendering the list
            const statusSpan = document.getElementById(`status-s${season}-e${epNum}`);
            if (statusSpan) {
                statusSpan.innerText = '✅';
            }
        }

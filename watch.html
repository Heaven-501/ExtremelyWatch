<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Extremely Weeb - المشاهدة</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #FF0055;
            --bg: #0f0f13;
            --card-bg: #1a1a20;
            --text: #ffffff;
            --success: #00ff88;
            --server-btn-bg: #25252e;
        }

        body {
            margin: 0;
            padding: 100px 25px 100px 25px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
        }

        .video-container {
            width: 100%;
            position: relative;
            z-index: 100;
            background: #000;
            aspect-ratio: 16/9;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            border-radius: 12px;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .container { padding: 15px; }

        /* --- Header Info --- */
        .anime-title { font-size: 1.4rem; margin: 10px 0 5px; color: var(--primary); }
        .anime-ep-title { font-size: 0.9rem; color: #aaa; margin-bottom: 15px; }

        /* --- Server Selector --- */
        .servers-section {
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid #333;
        }

        .section-label { font-size: 0.8rem; color: #888; margin-bottom: 8px; display: block; }

        .server-list {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }
        
        .server-btn {
            background: var(--server-btn-bg);
            border: 1px solid #444;
            border-radius: 6px;
            padding: 8px 12px;
            color: white;
            cursor: pointer;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            font-size: 0.85rem;
        }

        .server-btn img {
            width: 16px;
            height: 16px;
            object-fit: contain;
        }

        .server-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.4);
        }

        /* --- Episode List --- */
        .ep-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }

        .ep-btn {
            background: var(--card-bg);
            border: 1px solid #333;
            padding: 12px 15px;
            border-radius: 8px;
            color: white;
            text-align: right;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ep-btn:active, .ep-btn.active {
            background: #2a2a35;
            border-left: 4px solid var(--primary);
        }

        /* TV Remote D-Pad Focus States */
        .ep-btn:focus, .server-btn:focus, .back-btn-new:focus, .fs-btn:focus {
            outline: 3px solid var(--success);
            background: #2a2a35;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        .ep-num { font-weight: bold; font-size: 1rem; }
        
        .status-icon { display: none; }
        .ep-btn.watched .status-icon { display: block; }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-top: 15px;
            gap: 10px;
        }

        .title-container { flex: 1; }

        .back-btn-new {
            background: var(--card-bg);
            border: 1px solid #333;
            color: var(--text);
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .back-btn-new:active {
            transform: scale(0.9);
            background: #25252e;
        }

        .video-container.fullscreen-mode {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            border-radius: 0;
            margin: 0;
            padding: 0;
        }

        .fs-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            z-index: 1001;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>

    <div class="video-container" id="video-box">
        <iframe id="main-player" src="" allowfullscreen="true" allow="autoplay; fullscreen; picture-in-picture"></iframe>
        
        <button class="fs-btn" onclick="toggleMegaFullscreen()" tabindex="0">
            ⛶ 
        </button>
    </div>

    <div class="container">
        <div class="header-row">
            <div class="title-container">
                <h1 class="anime-title" id="anime-title" style="margin:0;">Loading...</h1>
                <div class="anime-ep-title" id="current-ep-label">اختر حلقة للبدء</div>
            </div>
            
            <a href="index.html" class="back-btn-new" title="رجوع" tabindex="0">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
        </div>

        <div class="servers-section" id="servers-box" style="display:none;">
            <span class="section-label">السيرفرات المتاحة:</span>
            <div class="server-list" id="server-list"></div>
        </div>

        <h3 style="margin-top: 20px;">الحلقات</h3>
        <div class="ep-list" id="ep-list"></div>
    </div>

    <script>
        // 1. Safe Telegram Initialization
        let tg = null;
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) {
            tg = window.Telegram.WebApp;
            tg.expand();
        }

        const icons = {
            "OK.ru": "https://i.im.ge/2026/02/02/e2wQA9.ok-ru-logo.png",
            mega: "https://upload.wikimedia.org/wikipedia/commons/f/f3/MEGA_logo.svg",
            DailyMotion: "https://i.imgur.com/0MYoJ16.png",
            default: "https://cdn-icons-png.flaticon.com/512/565/565296.png"
        };

        const db = {
            "AzumangaDaioh": {
                title: "Azumanga Daioh",
                episodes: [
                    { id: 1, title: "طالبة طفلة في المدرسة الثانوية / إنها معجزة / ربما مخيفة؟ / القط البري تومو تشان!", servers: [{ name: "OK.ru", icon: icons["OK.ru"], url: "https://ok.ru/videoembed/11551113022030?nochat=1" }] },
                    { id: 2, title: "أوساكا اليوم أيضًا / P.E.، الكرة الطائرة / الفواق / الدماغ... / علامة تجارية جديدة", servers: [{ name: "OK.ru", icon: icons["OK.ru"], url: "https://ok.ru/videoembed/11551280335438?nochat=1" }] },
                    { id: 3, title: "نيامو / التنافس بين الفصائل / يوكاري هنا / ليس خطأي / إلى الأبد", servers: [{ name: "OK.ru", icon: icons["OK.ru"], url: "https://ok.ru/videoembed/11551291476558?nochat=1" }] }
                ]
            },
            "SEL": {
                title: "Serial Experiments Lain",
                episodes: [
                    { id: 1, title: "الطبقة الأولى: غريب", servers: [{ name: "OK.ru", icon: icons["OK.ru"], url: "https://ok.ru/videoembed/12601521343054?nochat=1" }] },
                    { id: 2, title: "الطبقة الثانية: فتيات", servers: [{ name: "OK.ru", icon: icons["OK.ru"], url: "https://ok.ru/videoembed/12601528420942?nochat=1" }] },
                    { id: 3, title: "الطبقة الثالثة: نفسي", servers: [{ name: "OK.ru", icon: icons["DailyMotion"], url: "https://www.dailymotion.com/embed/video/k4n0g89qUt8rHAFfwhC?autoplay=1&mute=1"}] },
                    { id: 4, title: "الطبقة الرابعة: دين", servers: [{ name: "OK.ru", icon: icons["OK.ru"], url: "https://ok.ru/videoembed/12601539234382?nochat=1" }] },
                    { id: 5, title: "الطبقة الخامسة: تشويه", servers: [{ name: "OK.ru", icon: icons["OK.ru"], url: "https://ok.ru/videoembed/12601542249038?nochat=1" }] },
                    { id: 6, title: "الطبقة السادسة: أطفال", servers: [{ name: "OK.ru", icon: icons["OK.ru"], url: "https://ok.ru/videoembed/12601546181198?nochat=1" }] },
                    { id: 7, title: "الطبقة السابعة: مجتمع", servers: [{ name: "OK.ru", icon: icons["OK.ru"], url: "https://ok.ru/videoembed/12601550572110?nochat=1" }] },
                    { id: 8, title: "الطبقة الثامنة: شائعات", servers: [{ name: "OK.ru", icon: icons["OK.ru"], url: "https://ok.ru/videoembed/12601553717838?nochat=1" }] },
                    { id: 9, title: "الطبقة التاسعة: نموذج أولي", servers: [{ name: "OK.ru", icon: icons["OK.ru"], url: "https://ok.ru/videoembed/12601557912142?nochat=1" }] },
                    { id: 10, title: "الطبقة العاشرة: حب", servers: [{ name: "OK.ru", icon: icons["OK.ru"], url: "https://ok.ru/videoembed/12601560861262?nochat=1" }] },
                    { id: 11, title: "الطبقة الحادية عشرة: معلومات", servers: [{ name: "OK.ru", icon: icons["OK.ru"], url: "https://ok.ru/videoembed/12601564138062?nochat=1" }] },
                    { id: 12, title: "الطبقة الثانية عشرة: مشهد طبيعي", servers: [{ name: "OK.ru", icon: icons["OK.ru"], url: "https://ok.ru/videoembed/12602488851022?nochat=1" }] },
                    { id: 13, title: "الطبقة الثالثة عشرة: الأنا", servers: [{ name: "OK.ru", icon: icons["OK.ru"], url: "https://ok.ru/videoembed/12602495011406?nochat=1" }] }
                ]
            },
            "DeathNote": {
                title: "Death Note",
                episodes: [
                    { id: 1, title: "الولادة من جديد", servers: [{ name: "DailyMotion", icon: icons["DailyMotion"], url: "https://www.dailymotion.com/embed/video/k61tqQscUP54RaFeWbO?autoplay=1&mute=1" }] },
                    { id: 2, title: "المواجهة", servers: [{ name: "DailyMotion", icon: icons["DailyMotion"], url: "https://www.dailymotion.com/embed/video/k2NvyQhFYlaIMnFeWeq?autoplay=1&mute=1" }] },
                    { id: 3, title: "الصفقات", servers: [{ name: "DailyMotion", icon: icons["DailyMotion"], url: "https://www.dailymotion.com/embed/video/kk25E8SWstd4juzFeWiq?autoplay=1&mute=1" }] },
                    { id: 4, title: "المطاردة", servers: [{ name: "DailyMotion", icon: icons["DailyMotion"], url: "https://www.dailymotion.com/embed/video/k2pUPN12VfrAVHFeWsS?autoplay=1&mute=1" }] },
                    { id: 5, title: "التكتيكات", servers: [{ name: "DailyMotion", icon: icons["DailyMotion"], url: "https://www.dailymotion.com/embed/video/k2vsYy5BlA081LFeWum?autoplay=1&mute=1" }] },
                    { id: 6, title: "الانكشاف", servers: [{ name: "DailyMotion", icon: icons["DailyMotion"], url: "https://www.dailymotion.com/embed/video/k65hOfTyILWGqdFfbd6?autoplay=1&mute=1" }] },
                    { id: 7, title: "الغيوم", servers: [{ name: "DailyMotion", icon: icons["DailyMotion"], url: "https://www.dailymotion.com/embed/video/k6h5MxkhTgDi2WFfbeg?autoplay=1&mute=1" }] },
                    { id: 8, title: "التحديق", servers: [{ name: "DailyMotion", icon: icons["DailyMotion"], url: "https://www.dailymotion.com/embed/video/k5NhNoKgTOe29QFfblg?autoplay=1&mute=1" }] },
                    { id: 9, title: "اللقاء", servers: [{ name: "DailyMotion", icon: icons["DailyMotion"], url: "https://www.dailymotion.com/embed/video/k5olelkjMaMX6ZFfbq6?autoplay=1&mute=1" }] },
                    { id: 10, title: "الشك", servers: [{ name: "DailyMotion", icon: icons["DailyMotion"], url: "https://www.dailymotion.com/embed/video/k1ICUC3zHGR53GFfbsg?autoplay=1&mute=1" }] },
                    { id: 11, title: "الهجوم", servers: [{ name: "DailyMotion", icon: icons["DailyMotion"], url: "https://www.dailymotion.com/embed/video/k1DmP5ChwpwocbFfbH0?autoplay=1&mute=1" }] },
                    { id: 12, title: "الحب", servers: [{ name: "DailyMotion", icon: icons["DailyMotion"], url: "https://www.dailymotion.com/embed/video/k49aRagJcVsrelFfbIa?autoplay=1&mute=1" }] }
                ]
            },
            "JOJOSBR": {
                title: "Steel Ball Run: JoJo's Bizarre Adventure",
                episodes: [
                    { id: 1, title: "المرحلة الأولى", servers: [{ name: "DailyMotion", icon: icons["DailyMotion"], url: "https://www.dailymotion.com/embed/video/k1BfCHtbCrzAHAFf9VW?autoplay=1&mute=1" }] }
                ]
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        // Changed fallback to 'SEL' so data isn't undefined if accessed directly
        const animeId = urlParams.get('id') || 'SEL'; 
        const data = db[animeId];

        document.getElementById('anime-title').innerText = data ? data.title : "Anime Not Found";
        const player = document.getElementById('main-player');
        const epListContainer = document.getElementById('ep-list');
        const serverListContainer = document.getElementById('server-list');
        const serversBox = document.getElementById('servers-box');

        if (data) {
            data.episodes.forEach((ep, index) => {
                const btn = document.createElement('div');
                btn.className = 'ep-btn';
                btn.id = `ep-btn-${ep.id}`;
                btn.tabIndex = 0; // Allows TV remote to focus on this element
                btn.innerHTML = `
                    <div class="ep-info">
                        <span class="ep-num">الحلقة ${ep.id}</span>
                    </div>
                    <div class="status-icon">✅</div>
                `;
                
                btn.onclick = () => selectEpisode(ep, btn);
                // Allow triggering via remote "OK" button (Enter key)
                btn.onkeydown = (e) => { if (e.key === 'Enter') selectEpisode(ep, btn); };
                epListContainer.appendChild(btn);
            });
        }

        function selectEpisode(episodeData, btnElement) {
            document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');

            serversBox.style.display = 'block';
            document.getElementById('current-ep-label').innerText = `الحلقة ${episodeData.id}: ${episodeData.title}`;

            renderServers(episodeData.servers);

            if (episodeData.servers.length > 0) {
                changeServer(episodeData.servers[0].url, 0);
            }

            markAsWatched(animeId, episodeData.id, btnElement);
        }

        function renderServers(servers) {
            serverListContainer.innerHTML = ''; 
            
            servers.forEach((server, index) => {
                const sBtn = document.createElement('button');
                sBtn.className = 'server-btn';
                sBtn.id = `server-btn-${index}`;
                sBtn.tabIndex = 0; // Focusable for remote
                
                sBtn.innerHTML = `<img src="${server.icon}" alt=""> ${server.name}`;
                
                sBtn.onclick = () => changeServer(server.url, index);
                serverListContainer.appendChild(sBtn);
            });
        }

        function changeServer(url, btnIndex) {
            player.src = url;
            document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`server-btn-${btnIndex}`);
            if(activeBtn) activeBtn.classList.add('active');
        }

        function markAsWatched(animeId, epId, btnElement) {
            btnElement.classList.add('watched');

            const key = `extWeeb_${animeId}_watched`;
            let watched = JSON.parse(localStorage.getItem(key)) || [];
            if (!watched.includes(epId)) {
                watched.push(epId);
                localStorage.setItem(key, JSON.stringify(watched));
            }

            const resumeData = {
                id: animeId,
                title: data.title,
                season: 1, 
                episode: epId,
                url: window.location.href 
            };
            localStorage.setItem('extWeeb_lastWatch', JSON.stringify(resumeData));
        }

        window.onload = () => {
            const key = `extWeeb_${animeId}_watched`;
            const watched = JSON.parse(localStorage.getItem(key)) || [];
            
            watched.forEach(epId => {
                const el = document.getElementById(`ep-btn-${epId}`);
                if (el) el.classList.add('watched');
            });
        };

        // Hybrid Fullscreen: Works on Telegram AND standard Web Browsers (TV/PC)
        function toggleMegaFullscreen() {
            const videoBox = document.getElementById('video-box');
            const isFull = videoBox.classList.toggle('fullscreen-mode');

            if (tg) {
                if (isFull) {
                    if (tg.unlockOrientation) tg.unlockOrientation();
                    if (tg.requestFullscreen) tg.requestFullscreen();
                } else {
                    if (tg.lockOrientation) tg.lockOrientation('portrait');
                    if (tg.exitFullscreen) tg.exitFullscreen();
                }
            } else {
                if (isFull) {
                    if (videoBox.requestFullscreen) {
                        videoBox.requestFullscreen();
                    } else if (videoBox.webkitRequestFullscreen) { /* Safari */
                        videoBox.webkitRequestFullscreen();
                    } else if (videoBox.msRequestFullscreen) { /* IE11 */
                        videoBox.msRequestFullscreen();
                    }
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    } else if (document.webkitExitFullscreen) { /* Safari */
                        document.webkitExitFullscreen();
                    } else if (document.msExitFullscreen) { /* IE11 */
                        document.msExitFullscreen();
                    }
                }
            }
        }
    </script>
</body>
</html>

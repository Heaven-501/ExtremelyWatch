<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watching - Extremely Weeb</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #f7ebff; --box: #ffffff; --primary: #9b59b6; --text: #2c3e50; }
        [data-theme="dark"] { --bg: #0a0a0c; --box: #141419; --primary: #4a5c68; --text: #e0e0e0; }

        body { font-family: "Verdana", sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; transition: 0.3s; }
        
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .back-btn { color: var(--primary); text-decoration: none; font-weight: bold; background: var(--box); padding: 8px 12px; border-radius: 5px; border: 2px solid var(--primary); }
        
        .player-container { background: #000; aspect-ratio: 16/9; width: 100%; border: 3px solid var(--primary); border-radius: 8px; overflow: hidden; margin-bottom: 15px; }
        iframe { width: 100%; height: 100%; border: none; }

        .info-card { background: var(--box); border: 2px dashed var(--primary); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .info-card h2 { margin: 0 0 5px 0; color: var(--primary); font-size: 1.2rem; }
        .ep-title-meta { font-size: 0.9rem; color: var(--text); opacity: 0.8; }
        
        .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 10px; margin-top: 15px; }
        .ep-btn { background: var(--primary); color: white; padding: 10px 5px; text-align: center; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 0.9rem; }
        .ep-btn.active { background: #ff9ff3; border: 2px solid #fff; color: #000; }
        [data-theme="dark"] .ep-btn.active { background: #8b9dc3; }
    </style>
</head>
<body>

    <div class="header-nav">
        <a href="index.html" class="back-btn">← Back</a>
    </div>

    <div class="player-container">
        <iframe id="video-player" src="" allowfullscreen></iframe>
    </div>

    <div class="info-card">
        <h2 id="anime-title">Loading...</h2>
        <div id="ep-title" class="ep-title-meta"></div>
        
        <div class="ep-grid" id="ep-list">
            </div>
    </div>

    <script>
        // --- THEME & TELEGRAM ---
        if (localStorage.getItem('weeb_theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }

        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            if (tg.requestFullscreen) tg.requestFullscreen();
        }

        // --- DATA LOGIC ---
        const params = new URLSearchParams(window.location.search);
        const animeId = params.get('id');
        const currentEpId = parseInt(params.get('ep')) || 1;

        async function loadVideoData() {
            try {
                const response = await fetch('./data.json');
                const data = await response.json();
                
                const anime = data[animeId];
                if (!anime) {
                    document.getElementById('anime-title').innerText = "Anime Not Found";
                    return;
                }

                document.getElementById('anime-title').innerText = anime.title;
                
                // If anime has no episodes yet
                if (!anime.episodes || anime.episodes.length === 0) {
                    document.getElementById('ep-title').innerText = "Episodes coming soon!";
                    return;
                }

                // Find matching episode or fallback to first one
                const episode = anime.episodes.find(e => e.id === currentEpId) || anime.episodes[0];
                
                if (episode) {
                    // Arab language support via your JSON
                    document.getElementById('ep-title').innerText = `Playing: ${episode.title}`;
                    
                    // Load the first server link (OK.ru / FastServer)
                    if (episode.servers && episode.servers.length > 0) {
                        document.getElementById('video-player').src = episode.servers[0].url;
                    }

                    // Save Progress to LocalStorage
                    localStorage.setItem('extWeeb_lastWatch', JSON.stringify({
                        title: anime.title,
                        episode: episode.id,
                        url: window.location.href
                    }));
                }

                // Generate Episode Buttons
                const list = document.getElementById('ep-list');
                anime.episodes.forEach(ep => {
                    const btn = document.createElement('a');
                    btn.href = `watch.html?id=${animeId}&ep=${ep.id}`;
                    btn.className = `ep-btn ${ep.id === episode.id ? 'active' : ''}`;
                    btn.innerText = ep.id;
                    list.appendChild(btn);
                });

            } catch (err) {
                console.error(err);
                document.getElementById('anime-title').innerText = "Error loading data.";
            }
        }

        document.addEventListener('DOMContentLoaded', loadVideoData);
    </script>
</body>
</html>

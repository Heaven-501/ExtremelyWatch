<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extremely Weeb - المشاهدة</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #FF0055;
            --bg: #0f0f13;
            --card-bg: #1a1a20;
            --text: #ffffff;
            --success: #00ff88;
            --server-btn-bg: #25252e;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding-bottom: 50px;
        }

/* استبدل تعريف .video-container الحالي بالتالي */
.video-container {
    width: 100%;
    position: relative; /* لم يعد ثابتاً */
    z-index: 100;
    background: #000;
    aspect-ratio: 16/9;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
}

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .container { padding: 15px; }

        /* --- Header Info --- */
        .anime-title { font-size: 1.4rem; margin: 10px 0 5px; color: var(--primary); }
        .anime-ep-title { font-size: 0.9rem; color: #aaa; margin-bottom: 15px; }

        /* --- Server Selector (New Feature) --- */
        .servers-section {
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid #333;
        }

        .section-label { font-size: 0.8rem; color: #888; margin-bottom: 8px; display: block; }

        .server-list {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none; /* Hide scrollbar for cleaner look */
        }
        
        .server-btn {
            background: var(--server-btn-bg);
            border: 1px solid #444;
            border-radius: 6px;
            padding: 8px 12px;
            color: white;
            cursor: pointer;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            font-size: 0.85rem;
        }

        .server-btn img {
            width: 16px;
            height: 16px;
            object-fit: contain;
        }

        .server-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.4);
        }

        /* --- Episode List --- */
        .ep-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }

        .ep-btn {
            background: var(--card-bg);
            border: 1px solid #333;
            padding: 12px 15px;
            border-radius: 8px;
            color: white;
            text-align: right;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ep-btn:active, .ep-btn.active {
            background: #2a2a35;
            border-left: 4px solid var(--primary);
        }

        .ep-num { font-weight: bold; font-size: 1rem; }
        
        /* Checkmark */
        .status-icon { display: none; }
        .ep-btn.watched .status-icon { display: block; }

        /* Back Button */
        .back-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.6);
            padding: 8px 12px;
            border-radius: 5px;
            color: white;
            text-decoration: none;
            z-index: 101;
            font-size: 0.9rem;
            backdrop-filter: blur(4px);
        }

<style>
    /* ... your existing styles ... */

    /* New Back Button Styling */
    .header-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-top: 15px;
        gap: 10px;
    }

    .title-container {
        flex: 1;
    }

    .back-btn-new {
        background: var(--card-bg);
        border: 1px solid #333;
        color: var(--text);
        text-decoration: none;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 1.2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.2s;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .back-btn-new:active {
        transform: scale(0.9);
        background: #25252e;
    }

    /* Remove the old absolute back-btn style from your <style> block */
    .back-btn { display: none; } 
</style>

        
    </style>
</head>
<body>

    <div class="video-container">
        <iframe id="main-player" src="" allowfullscreen></iframe>
    </div>

    <div class="container">
        <div class="header-row">
            <div class="title-container">
                <h1 class="anime-title" id="anime-title" style="margin:0;">Loading...</h1>
                <div class="anime-ep-title" id="current-ep-label">اختر حلقة للبدء</div>
            </div>
            
            <a href="index.html" class="back-btn-new" title="رجوع">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
        </div>

        <div class="servers-section" id="servers-box" style="display:none;">
            <span class="section-label">السيرفرات المتاحة:</span>
            <div class="server-list" id="server-list"></div>
        </div>

        <h3 style="margin-top: 20px;">الحلقات</h3>
        <div class="ep-list" id="ep-list"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ---------------------------------------------------------
        // 1. DATABASE (JSON Structure)
        // ---------------------------------------------------------
        
        // Icon Links for Servers (You can change these urls)
        const icons = {
            "OK.ru": "https://i.im.ge/2026/02/02/e2wQA9.ok-ru-logo.png",
            mega: "https://upload.wikimedia.org/wikipedia/commons/f/f3/MEGA_logo.svg",
            vidstream: "https://cdn-icons-png.flaticon.com/512/2620/2620579.png",
            default: "https://cdn-icons-png.flaticon.com/512/565/565296.png"
        };

        // Complete Anime Data
const db = {
    "AzumangaDaioh": {
        title: "Azumanga Daioh",
        episodes: [
            {
                id: 1, 
                title: "طالبة طفلة في المدرسة الثانوية / إنها معجزة / ربما مخيفة؟ / القط البري تومو تشان!", 
                servers: [
                    {
                        name: "OK.ru",
                        icon: icons["OK.ru"], 
                        url: "https://ok.ru/videoembed/11551113022030?nochat=1"
                    }
                ]
            },
            {
                id: 2, 
                title: "أوساكا اليوم أيضًا / P.E.، الكرة الطائرة / الفواق / الدماغ... / علامة تجارية جديدة", 
                servers: [
                    {
                        name: "OK.ru",
                        icon: icons["OK.ru"], 
                        url: "https://ok.ru/videoembed/11551280335438?nochat=1"
                    }
                ] // <-- FIX: Closed the servers array and Episode 2 object properly
            },
            {
                id: 3, 
                title: "نيامو / التنافس بين الفصائل / يوكاري هنا / ليس خطأي / إلى الأبد", 
                servers: [
                    {
                        name: "OK.ru",
                        icon: icons["OK.ru"], 
                        url: "https://ok.ru/video/11551291476558?nochat=1"
                    } // <-- FIX: Removed the extra comma that was here
                ]
            }
        ]
    },
    "onepiece": {
        title: "One Piece",
        episodes: [
            {
                id: 1,
                title: "بداية الرحلة",
                servers: [
                    {
                        name: "FastServer",
                        icon: icons.default, 
                        url: "https://www.youtube.com/embed/S8_YwFLCh4U"
                    }
                ]
            }
        ]
    }
};


        // ---------------------------------------------------------
        // 2. INITIALIZATION
        // ---------------------------------------------------------

        const urlParams = new URLSearchParams(window.location.search);
        const animeId = urlParams.get('id') || 'naruto'; 
        const data = db[animeId];

        // Set Headers
        document.getElementById('anime-title').innerText = data ? data.title : "Anime Not Found";
        const player = document.getElementById('main-player');
        const epListContainer = document.getElementById('ep-list');
        const serverListContainer = document.getElementById('server-list');
        const serversBox = document.getElementById('servers-box');

        // Render Episode List
        if (data) {
            data.episodes.forEach((ep, index) => {
                const btn = document.createElement('div');
                btn.className = 'ep-btn';
                btn.id = `ep-btn-${ep.id}`;
                btn.innerHTML = `
                    <div class="ep-info">
                        <span class="ep-num">الحلقة ${ep.id}</span>
                    </div>
                    <div class="status-icon">✅</div>
                `;
                
                // Click: Select Episode
                btn.onclick = () => selectEpisode(ep, btn);
                epListContainer.appendChild(btn);
            });
        }

        // ---------------------------------------------------------
        // 3. LOGIC FUNCTIONS
        // ---------------------------------------------------------

        function selectEpisode(episodeData, btnElement) {
            // 1. UI: Highlight active episode
            document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');

            // 2. UI: Show Server Section
            serversBox.style.display = 'block';
            document.getElementById('current-ep-label').innerText = `الحلقة ${episodeData.id}: ${episodeData.title}`;

            // 3. Logic: Render Servers for this episode
            renderServers(episodeData.servers);

            // 4. Logic: Auto-play first server
            if (episodeData.servers.length > 0) {
                changeServer(episodeData.servers[0].url, 0);
            }

            // 5. Save Progress
            markAsWatched(animeId, episodeData.id, btnElement);
        }

        function renderServers(servers) {
            serverListContainer.innerHTML = ''; // Clear old servers
            
            servers.forEach((server, index) => {
                const sBtn = document.createElement('button');
                sBtn.className = 'server-btn';
                sBtn.id = `server-btn-${index}`;
                
                // Icon + Name
                sBtn.innerHTML = `<img src="${server.icon}" alt=""> ${server.name}`;
                
                sBtn.onclick = () => changeServer(server.url, index);
                serverListContainer.appendChild(sBtn);
            });
        }

        function changeServer(url, btnIndex) {
            // Change Iframe
            player.src = url;

            // Highlight active server button
            document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`server-btn-${btnIndex}`);
            if(activeBtn) activeBtn.classList.add('active');
        }

        function markAsWatched(animeId, epId, btnElement) {
            // Add checkmark visually
            btnElement.classList.add('watched');

            // Save Episode History
            const key = `extWeeb_${animeId}_watched`;
            let watched = JSON.parse(localStorage.getItem(key)) || [];
            if (!watched.includes(epId)) {
                watched.push(epId);
                localStorage.setItem(key, JSON.stringify(watched));
            }

            // Save "Last Watched" for Main Menu banner
            const resumeData = {
                id: animeId,
                title: data.title,
                season: 1, // You can make this dynamic if needed
                episode: epId,
                url: window.location.href // Saves page link
            };
            localStorage.setItem('extWeeb_lastWatch', JSON.stringify(resumeData));
        }

        // ---------------------------------------------------------
        // 4. ON LOAD: Restore History
        // ---------------------------------------------------------
        window.onload = () => {
            const key = `extWeeb_${animeId}_watched`;
            const watched = JSON.parse(localStorage.getItem(key)) || [];
            
            watched.forEach(epId => {
                const el = document.getElementById(`ep-btn-${epId}`);
                if (el) el.classList.add('watched');
            });
        };

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watching - Extremely Weeb</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #f7ebff; --box: #ffffff; --primary: #9b59b6; --text: #2c3e50;
        }
        [data-theme="dark"] {
            --bg: #0a0a0c; --box: #141419; --primary: #4a5c68; --text: #e0e0e0;
        }

        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        
        .player-container { 
            background: #000; aspect-ratio: 16/9; width: 100%; 
            border: 3px solid var(--primary); border-radius: 8px; overflow: hidden;
        }
        iframe { width: 100%; height: 100%; border: none; }

        .info-card { background: var(--box); border: 2px dashed var(--primary); padding: 15px; margin-top: 15px; border-radius: 8px; }
        
        .ep-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 10px; margin-top: 15px; }
        .ep-btn { 
            background: var(--primary); color: white; padding: 10px; text-align: center; 
            text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 0.9rem;
        }
        .ep-btn.active { background: #ff9ff3; border: 2px solid #fff; }

        .back-btn { display: inline-block; margin-bottom: 15px; color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Back to Home</a>

    <div class="player-container">
        <iframe id="video-player" src="" allowfullscreen></iframe>
    </div>

    <div class="info-card">
        <h2 id="anime-title" style="margin-top:0;">Loading...</h2>
        <p id="ep-title" style="color: var(--primary); font-size: 0.9rem;"></p>
        <div class="ep-list" id="ep-list"></div>
    </div>

    <script>
        // Apply saved theme
        const savedTheme = localStorage.getItem('weeb_theme');
        if (savedTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

        const params = new URLSearchParams(window.location.search);
        const animeId = params.get('id');
        const currentEpId = parseInt(params.get('ep')) || 1;

        fetch('./data.json')
            .then(res => res.json())
            .then(data => {
                const anime = data[animeId];
                if (!anime) return;

                document.getElementById('anime-title').innerText = anime.title;
                
                // Find current episode object
                const episode = anime.episodes.find(e => e.id === currentEpId) || anime.episodes[0];
                
                if (episode) {
                    document.getElementById('ep-title').innerText = `Now Playing: ${episode.title}`;
                    // Load the first server URL
                    document.getElementById('video-player').src = episode.servers[0].url;

                    // Save to "Continue Watching"
                    localStorage.setItem('extWeeb_lastWatch', JSON.stringify({
                        title: anime.title,
                        episode: episode.id,
                        url: window.location.href
                    }));
                }

                // Generate Episode Buttons
                const list = document.getElementById('ep-list');
                anime.episodes.forEach(ep => {
                    const btn = document.createElement('a');
                    btn.href = `watch.html?id=${animeId}&ep=${ep.id}`;
                    btn.className = `ep-btn ${ep.id === currentEpId ? 'active' : ''}`;
                    btn.innerText = ep.id;
                    list.appendChild(btn);
                });
            });

        // Telegram Fullscreen
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }
    </script>
</body>
</html>

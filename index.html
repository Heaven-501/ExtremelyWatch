<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extremely Weeb - الرئيسية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #FF0055;
            --bg: #0f0f13;
            --card-bg: #1a1a20;
            --text: #ffffff;
            --text-sec: #aaaaaa;
        }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); padding-bottom: 20px; }
        header { text-align: center; padding: 20px 0; background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%); }
        .logo { width: 120px; border-radius: 50%; border: 3px solid var(--primary); box-shadow: 0 0 15px var(--primary); }
        h1 { margin: 10px 0 5px; font-size: 1.5rem; }
        .user-greeting { font-size: 0.9rem; color: var(--text-sec); margin-bottom: 20px; }
        .container { padding: 0 15px; max-width: 600px; margin: 0 auto; }
        
        #continue-watching {
            display: none;
            background: linear-gradient(90deg, #2b2b36 0%, #1a1a20 100%);
            border-right: 4px solid var(--primary);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.2s;
        }
        #continue-watching:active { transform: scale(0.98); }
        .cw-header { font-size: 0.8rem; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; font-weight: bold; }
        .cw-title { font-size: 1.1rem; margin-bottom: 3px; }
        .cw-ep { font-size: 0.9rem; color: var(--text-sec); }

        .section-title { font-size: 1.2rem; margin-bottom: 15px; border-right: 3px solid var(--primary); padding-right: 10px; }
        .anime-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .anime-card { background-color: var(--card-bg); border-radius: 10px; overflow: hidden; text-decoration: none; color: var(--text); transition: transform 0.2s; position: relative; }
        .anime-card:active { transform: scale(0.96); }
        .card-img { width: 100%; height: 220px; object-fit: cover; display: block; }
        .card-info { padding: 10px; }
        .anime-title { font-size: 0.95rem; font-weight: bold; margin-bottom: 5px; display: block;}
        .anime-meta { font-size: 0.75rem; color: var(--text-sec); display: flex; justify-content: space-between; }
        .rating { color: #FFD700; }
    </style>
</head>
<body>

    <header>
        <img src="https://i.imgur.com/RTMsSps.jpeg" alt="Logo" class="logo">
        <h1>Extremely Weeb</h1>
        <div id="user-greeting" class="user-greeting">
            أهلاً بك، <span id="user-name">المستخدم</span> 👋
        </div>
    </header>

    <div class="container">
        <div id="continue-watching" onclick="resumeWatching()">
            <div class="cw-header">🔥 تابع المشاهدة</div>
            <div class="cw-title" id="cw-anime-title">اسم الأنمي هنا</div>
            <div class="cw-ep" id="cw-episode-info">الحلقة 1</div>
        </div>

        <div class="section-title">أحدث الإضافات</div>
        
        <div class="anime-grid" id="anime-grid"></div>
    </div>

    <script>
        // Telegram Init
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            if (tg.requestFullscreen) tg.requestFullscreen();
            const userName = tg.initDataUnsafe?.user?.first_name || "المستخدم";
            document.getElementById('user-name').innerText = userName;
        }

        // Continue Watching Logic
        const lastWatchData = JSON.parse(localStorage.getItem('extWeeb_lastWatch'));
        if (lastWatchData) {
            const cwBox = document.getElementById('continue-watching');
            document.getElementById('cw-anime-title').innerText = lastWatchData.title;
            document.getElementById('cw-episode-info').innerText = `الحلقة ${lastWatchData.episode}`;
            cwBox.style.display = 'block';
        }

        function resumeWatching() {
            if (lastWatchData) window.location.href = lastWatchData.url;
        }

        // Fetch JSON and build grid
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                const grid = document.getElementById('anime-grid');
                
                // Loop through each anime in the JSON
                for (const [id, info] of Object.entries(data)) {
                    const card = document.createElement('a');
                    card.href = `watch.html?id=${id}`;
                    card.className = 'anime-card';
                    card.innerHTML = `
                        <img src="${info.cover}" class="card-img" alt="${info.title}">
                        <div class="card-info">
                            <span class="anime-title">${info.title}</span>
                            <div class="anime-meta">
                                <span>${info.genre}</span>
                                <span class="rating">⭐ ${info.rating}</span>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                }
            })
            .catch(err => console.error("Error loading JSON:", err));
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Extremely Weeb - Home</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* DEFAULT THEME (RETRO PURPLE) */
:root {
    --bg-color: #f7ebff; --main-bg: #ffffff; --primary: #9b59b6;
    --primary-dark: #8e44ad; --accent: #ff9ff3; --text-main: #2c3e50;
    --text-muted: #7f8c8d; --border-style: 2px dashed var(--primary-dark);
}

/* WIRED DARK THEME */
[data-theme="dark"] {
    --bg-color: #0a0a0c; --main-bg: #141419; --primary: #4a5c68;
    --primary-dark: #2c3e50; --accent: #8b9dc3; --text-main: #e0e0e0;
    --text-muted: #888888; --border-style: 2px solid var(--primary-dark);
}

body { margin: 0; font-family: "Verdana", sans-serif; background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; transition: 0.3s; }
header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background-color: var(--main-bg); border-bottom: 3px solid var(--primary-dark); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.logo-container { display: flex; align-items: center; gap: 15px; }
.logo-container img.logo { width: 55px; height: 55px; border: 2px solid var(--primary); border-radius: 8px; padding: 2px; background: var(--accent); }
.header-text h1 { margin: 0; font-size: 1.2rem; color: var(--primary-dark); text-transform: uppercase; text-shadow: 1px 1px 0px var(--accent); }
[data-theme="dark"] .header-text h1 { text-shadow: 1px 1px 0px #000; }
.user-greeting { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

.layout-container { display: flex; padding: 15px; gap: 20px; align-items: flex-start; flex-wrap: wrap; }
.content-area { flex: 1; min-width: 300px; }

.retro-box { background: var(--main-bg); border: var(--border-style); border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
.box-header { background-color: var(--primary); color: white; padding: 8px 12px; font-size: 1rem; font-weight: bold; border-bottom: 2px solid var(--primary-dark); }

.anime-item { display: flex; padding: 12px; border-bottom: 1px dotted var(--primary); text-decoration: none; color: var(--text-main); transition: background 0.2s; }
.anime-item:last-child { border-bottom: none; }
.anime-item:hover { background-color: var(--bg-color); }
.anime-item img { width: 80px; height: 110px; object-fit: cover; border: 2px solid var(--primary-dark); border-radius: 5px; margin-right: 15px; }
.anime-info { display: flex; flex-direction: column; justify-content: center; }
.anime-info .title { font-weight: bold; font-size: 1rem; color: var(--primary-dark); margin-bottom: 5px; }
[data-theme="dark"] .anime-info .title { color: var(--accent); }
.anime-info .meta { font-size: 0.8rem; color: var(--text-muted); line-height: 1.4; }
.badge { display: inline-block; background: var(--accent); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; margin-top: 5px; }

.theme-btn { display: inline-block; margin: 15px; padding: 8px 12px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="https://i.imgur.com/RTMsSps.jpeg" class="logo" alt="Logo">
        <div class="header-text">
            <h1>Extremely Weeb</h1>
            <div class="user-greeting">Welcome, <span id="user-name">Guest</span> ☆</div>
        </div>
    </div>
</header>

<button class="theme-btn" onclick="toggleTheme()">Toggle Dark/Light Mode</button>

<div class="layout-container">
    <div class="content-area">
        <div class="retro-box" id="continue-watching" style="display:none;">
            <div class="box-header">▶️ Continue Watching</div>
            <div style="padding: 12px; cursor: pointer;" onclick="resumeWatching()">
                <strong id="cw-anime-title" style="color: var(--primary-dark);">...</strong><br>
                <span id="cw-episode-info" style="font-size: 0.85rem;"></span>
            </div>
        </div>

        <div class="retro-box">
            <div class="box-header">⭐ Directory</div>
            <div id="anime-list">
                <div style="padding: 15px; text-align: center;">Loading data...</div>
            </div>
        </div>
    </div>
</div>

<script>
// --- THEME ---
let isDark = localStorage.getItem('weeb_theme') === 'dark';
if (isDark) document.documentElement.setAttribute('data-theme', 'dark');

function toggleTheme() {
    isDark = !isDark;
    if (isDark) {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('weeb_theme', 'dark');
    } else {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('weeb_theme', 'light');
    }
}

// --- TELEGRAM INIT ---
const tg = window.Telegram?.WebApp;
if (tg) {
    tg.ready();
    tg.expand();
    if (tg.requestFullscreen) tg.requestFullscreen();
    if (tg.initDataUnsafe?.user?.first_name) {
        document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name;
    }
}

// --- DATA ENGINE ---
async function initApp() {
    const list = document.getElementById('anime-list');
    
    try {
        const response = await fetch('./data.json');
        if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
        
        const data = await response.json();
        list.innerHTML = ''; // clear loading text

        // Loop through exact JSON keys
        for (const [id, info] of Object.entries(data)) {
            const totalEpisodes = info.episodes ? info.episodes.length : 0;
            const episodeText = totalEpisodes > 0 ? `Ep ${totalEpisodes} Updated` : 'Coming Soon';

            const item = document.createElement('a');
            item.href = `watch.html?id=${id}`;
            item.className = 'anime-item';

            item.innerHTML = `
                <img src="${info.cover}" alt="cover">
                <div class="anime-info">
                    <div class="title">${info.title}</div>
                    <div class="meta">
                        Genre: ${info.genre}<br>
                        Rating: ⭐ ${info.rating}
                    </div>
                    <div><span class="badge">${episodeText}</span></div>
                </div>
            `;
            list.appendChild(item);
        }

        // Continue Watching check
        const lastWatchData = JSON.parse(localStorage.getItem('extWeeb_lastWatch'));
        if (lastWatchData) {
            document.getElementById('cw-anime-title').innerText = lastWatchData.title;
            document.getElementById('cw-episode-info').innerText = `Episode ${lastWatchData.episode}`;
            document.getElementById('continue-watching').style.display = 'block';
        }

    } catch (error) {
        list.innerHTML = `<div style="padding:15px; color:red;">Failed to load data.json: ${error.message}</div>`;
    }
}

function resumeWatching() {
    const lastWatchData = JSON.parse(localStorage.getItem('extWeeb_lastWatch'));
    if (lastWatchData && lastWatchData.url) window.location.href = lastWatchData.url;
}

document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>

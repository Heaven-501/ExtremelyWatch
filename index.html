<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Extremely Weeb - الرئيسية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #FF0055;
            --bg: #0f0f13;
            --card-bg: #1a1a20;
            --text: #ffffff;
            --text-sec: #aaaaaa;
            --success: #00ff88; /* Added for focus state */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding-bottom: 40px;
        }
        
        header {
            text-align: center;
            padding: 100px 25px 0 25px; 
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
        }

        .container {
            padding: 0 25px; 
            max-width: 600px;
            margin: 0 auto;
        }

        .logo {
            width: 120px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            box-shadow: 0 0 15px var(--primary);
        }

        h1 { margin: 10px 0 5px; font-size: 1.5rem; }
        .user-greeting { font-size: 0.9rem; color: var(--text-sec); margin-bottom: 20px; }

        /* Continue Watching Banner */
        #continue-watching {
            display: none; 
            background: linear-gradient(90deg, #2b2b36 0%, #1a1a20 100%);
            border-right: 4px solid var(--primary);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: 0.2s;
            outline: none; /* Hide default browser outline */
        }

        /* TV/Keyboard Focus State */
        #continue-watching:focus, .anime-card:focus {
            outline: 3px solid var(--success);
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        #continue-watching:active, .anime-card:active { transform: scale(0.98); }

        .cw-header {
            font-size: 0.8rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .cw-title { font-size: 1.1rem; margin-bottom: 3px; }
        .cw-ep { font-size: 0.9rem; color: var(--text-sec); }

        .section-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            border-right: 3px solid var(--primary);
            padding-right: 10px;
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .anime-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            text-decoration: none;
            color: var(--text);
            transition: 0.2s;
            position: relative;
            display: block;
            outline: none;
        }

        .card-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .card-info { padding: 10px; }
        .anime-title { font-size: 0.95rem; font-weight: bold; margin-bottom: 5px; display: block;}
        .anime-meta { font-size: 0.75rem; color: var(--text-sec); display: flex; justify-content: space-between; }
        .rating { color: #FFD700; }

    </style>
</head>
<body>

    <header>
        <img src="https://i.imgur.com/RTMsSps.jpeg" alt="Logo" class="logo">
        <h1>Extremely Watch</h1>
        <div id="user-greeting" class="user-greeting">
            أهلاً بك، <span id="user-name">المستخدم</span> 👋
        </div>
    </header>

    <div class="container">
        <div id="continue-watching" onclick="resumeWatching()" tabindex="0">
            <div class="cw-header">🔥 تابع المشاهدة</div>
            <div class="cw-title" id="cw-anime-title">اسم الأنمي هنا</div>
            <div class="cw-ep" id="cw-episode-info">الحلقة 1</div>
        </div>

        <div class="section-title">أحدث الإضافات</div>
        
        <div class="anime-grid">
            <a href="watch.html?id=AzumangaDaioh" class="anime-card">
                <img src="https://upload.wikimedia.org/wikipedia/en/c/c4/AzumangaDaioh-vol1cover-jp.jpg" class="card-img" alt="Azumanga Daioh">
                <div class="card-info">
                    <span class="anime-title">Azumanga Daioh</span>
                    <div class="anime-meta">
                        <span>كوميديا</span>
                        <span class="rating">⭐ 8.2</span>
                    </div>
                </div>
            </a>

            <a href="watch.html?id=SEL" class="anime-card">
                <img src="https://upload.wikimedia.org/wikipedia/en/3/32/Serial_Experiments_Lain_DVD_vol_1.jpg" class="card-img" alt="Serial Experiments Lain">
                <div class="card-info">
                    <span class="anime-title">Serial Experiments Lain</span>
                    <div class="anime-meta">
                        <span>غموض</span>
                        <span class="rating">⭐ 3.5</span>
                    </div>
                </div>
            </a>
            
            <a href="watch.html?id=DeathNote" class="anime-card">
                <img src="https://upload.wikimedia.org/wikipedia/en/6/6f/Death_Note_Vol_1.jpg" class="card-img" alt="Death Note">
                <div class="card-info">
                    <span class="anime-title">Death Note</span>
                    <div class="anime-meta">
                        <span>جريمة</span>
                        <span class="rating">⭐ 9</span>
                    </div>
                </div>
            </a>

            <a href="watch.html?id=JOJOSBR" class="anime-card">
                <img src="https://upload.wikimedia.org/wikipedia/en/8/87/Steel_Ball_Run_1.jpg" class="card-img" alt="Steel Ball Run">
                <div class="card-info">
                    <span class="anime-title">Steel Ball Run: JoJo's Bizarre Adventure</span>
                    <div class="anime-meta">
                        <span>مغامرة</span>
                        <span class="rating">⭐ 9.5</span>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <script>
        // 1. Safe Telegram & Fullscreen logic
        let tg = null;
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) {
            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            
            if (tg.requestFullscreen) {
                tg.requestFullscreen();
            }

            const userName = tg.initDataUnsafe?.user?.first_name || "المستخدم";
            document.getElementById('user-name').innerText = userName;
        }

        // 2. Load "Continue Watching" Data
        const lastWatchData = JSON.parse(localStorage.getItem('extWeeb_lastWatch'));

        if (lastWatchData) {
            const cwBox = document.getElementById('continue-watching');
            document.getElementById('cw-anime-title').innerText = lastWatchData.title;
            // Cleaned up the display text
            document.getElementById('cw-episode-info').innerText = `الحلقة ${lastWatchData.episode}`;
            
            cwBox.style.display = 'block';
        }

        function resumeWatching() {
            if (lastWatchData) {
                window.location.href = lastWatchData.url;
            }
        }

        // 3. Handle TV Remote "Enter" key for the Continue Watching div
        document.getElementById('continue-watching').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') resumeWatching();
        });
    </script>

</body>
</html>
